name: Build

on:
  push:
    branches: ["master"]
    tags: ["*"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # - name: Set up MSVC (Windows)
      # # i.e. microsoft's compiler
      #   if: runner.os == 'Windows'
      #   uses: ilammy/msvc-dev-cmd@v1

      - name: Set up MSYS2 with MinGW (Windows)
      # i.e. the open source compiler
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: |
            make
            mingw-w64-ucrt-x86_64-gcc

      - name: Build
        if: runner.os != 'Windows'
        working-directory: src
        run: |
          make
          make dist

      - name: Build
        if: runner.os == 'Windows'
        # duplication is the unfortunately the easiest way to swap 'shell':
        shell: msys2 {0}
        working-directory: src
        run: |
          make
          make dist

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.os }}
          path: src/bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all platform bins
        uses: actions/download-artifact@v8
        with:
          pattern: bin-*
          path: src/bin/
          merge-multiple: true

      - name: Build release package
        working-directory: src
        run: make release

      - name: Upload release zip
        uses: actions/upload-artifact@v7
        with:
          name: svmachines
          path: svmachines.zip
          archive: false

      - name: Draft GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: svmachines.zip
